# Spring Boot 환경설정하는 파일 (DB, Tomcat 등)

# Tomcat Server Port 변경
server.port=8081

# Context Path 수정
# Context Path를 수정하지 않으면 기본 Context Path는 → / 다 (localhost:8081/가 Contextd Path가 된다)
# Context Path를 → /boot 로 바꿀것이다 
server.servlet.context-path=/boot

# DB설정
#  드라이버위치잡기
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/com
spring.datasource.username=com
spring.datasource.password=com01

# Spring JPA 설정 (JDBC → API) 이거를 → Hibernate(Spring JPA 구현체)가 한다 
# Spring에서는 Mapper Interface에서는 추상메서드를 만들면 추상메서드를 구현하는 클래스는 → SqlSessionFactoryBean 이 구현해서 만든다 
# SQL문장은 개발자가 짰다 
# 하지만 Spring JPA 에서는 Hibernate : SQL Query를 빌드시킨다 (자동생성)
# 사용예시
# JPA클래스.save(vo) 하면 알아서 → insert into Board(title, content, writer)
#                              values (#{title}, #{content}, #{writer}) 메소드 이름 하나로 처리해준다 
# 단점: 복잡한 쿼리는 직접 짜야하지만 간단한 SQL문은 작성을 알아서 해주는 장점이 있다  
# JPA와 Hibernate를 방식을 → ORM(Object Relational Mapping, 객체관계매핑)방식 이라 한다 

# JPA설정하기 
# MySQL 상세지정하기 
spring.jpa.database-platform=org.hibernate.dialect.MySQL5InnoDBDialect
# 스키마 생성(create, update)
spring.jpa.hibernate.ddl-auto=update
#JPA가 실행되고 나서 실행된 SQL문장 보기(Hibernate가 어떻게 SQL문장 확인 할 수 있다)
spring.jpa.show-sql=true
#실제 JPA 구현체인 Hiberate가 동작하면서 발생하는 SQL을 포메팅해서 출력
spring.jpa.properties.hibernate.format_sql=true

#Spring Boot ViewResolver 설정
spring.mvc.view.prefix=/WEB-INF/
spring.mvc.view.suffix=.jsp

# Spring Boot에서 resources 폴더에 접근하기 위한 설정
# resouces 폴더 아래 모든것들을 접근 할 수 있도록 설정을 하겠다 
spring.mvc.static-path-pattern=/resources/**

# MyBatis가 SQL 파일을 찾을 위치 지정
mybatis.mapper-locations=classpath:mapper/**/*.xml
# 매퍼에서 객체 타입을 짧게 쓰기 위한 패키지 설정
mybatis.type-aliases-package=kr.spring.entity


# 파일 하나당 최대 용량
spring.servlet.multipart.max-file-size=50MB
# 한 번의 요청당 전체 최대 용량
spring.servlet.multipart.max-request-size=50MB





